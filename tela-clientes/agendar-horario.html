<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Horario</title>
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/agendar-horario.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>    
</head>
<body>
    <header>
        <img src="../imagens/Logo Principal Vale.inf.png" alt="logo">
    </header>

    <main>
        <div class="icones">
            <a href="painel.html">
                <span class="material-symbols-outlined" style="font-size: 40px">arrow_back</span>
            </a>
            <a href="#">
                <span class="material-symbols-outlined" style="font-size: 40px">notifications</span>
            </a>
        </div>

        <h1>Agendar horário</h1>

        <form action="#" method="get">
            <div class="barbeiro">
                <details class="caixa-retratil">
                    <summary>
                        Toque para selecionar um barbeiro
                    </summary>

                    <div class="opcoes">
                        
                        <label for="adauto" class="item-selecionavel">
                            <input type="radio" name="barbeiro" id="adauto" value="adauto">
                            <span class="nome-barbeiro">Adauto Netto</span>
                            <div class="img"></div>
                        </label>

                        
                        <label for="diogo" class="item-selecionavel">
                            <input type="radio" name="barbeiro" id="diogo" value="diogo">
                            <span class="nome-barbeiro">Diogo Malosti</span>
                            <div class="img"></div>
                        </label>

                        <label for="vini" class="item-selecionavel">
                            <input type="radio" name="barbeiro" id="vini" value="vini">
                            <span class="nome-barbeiro">Vinicius nascimento</span>
                            <div class="img"></div>
                        </label>
                    </div>
                </details>
            </div>
        </form>
    </main>

    <footer>
        <div class="loc">
            <span class="material-symbols-outlined">location_on</span>
            <p>Rua Antonio Canineo 32 - parque são luis</p>
        </div>

        <div class="insta">
            <img src="../imagens/Instagram.svg" alt="">
            <p>@dautinn</p>
        </div>

        <div class="cel">
            <span class="material-symbols-outlined">
            call</span>
            <p>(12) 99653-0060</p>
        </div>

        <div class="mail">
            <span class="material-symbols-outlined">
            mail</span>
            <p>adauto.netto2005@gmail.com</p>
        </div>
    </footer>
</body>
</html>
