<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar senha</title>
    <link rel="stylesheet" href="estilos/global.css">
    <link rel="stylesheet" href="estilos/resetar.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
</head>
<body>
    <header>
        <img src="../imagens/Logo Principal Vale.inf.png" alt="logo">
    </header>
    <main>
        <a href="index.html">
            <span class="material-symbols-outlined" style="font-size: 40px">arrow_back</span>
        </a>
        <form action="#" method="post">
            <p>Está com problema para entrar ?</p>

            <span class="material-symbols-outlined">account_circle</span>

            <p>Insira o seu Email cadastrado que vamos mandar um link para voce restaurar a sua senha</p>

            <div class="email"><input type="email" placeholder="Insira o seu email" required></div>

            <div class="btn">
                <div class="cancel">
                    <input type="reset" value="Cancelar">
                </div>
                <div class="enviar">
                    <input type="submit" value="Resetar Senha">
                </div>
            </div>
        </form>

        <div class="rodape">
            <p>ou</p>
            <hr>
            <a href="criar-conta.html">Criar nova</a>
        </div>

    </main>
</body>
</html>
