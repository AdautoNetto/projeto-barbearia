<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta</title>
    <link rel="stylesheet" href="estilos/global.css">
    
    <link rel="stylesheet" href="estilos/criar.css">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>
<body>
    <header>
        <img src="../imagens/Logo Principal Vale.inf.png" alt="logo">
    </header>
    <main>
        <a href="index.html">
            <span class="material-symbols-outlined" style="font-size: 40px">arrow_back</span>
        </a>
        <form action="#" method="post">
            <span class="material-symbols-outlined">account_circle</span>

            <div class="nome">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o seu nome" required>
            </div>

            <div class="sobrenome">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite o seu sobrenome" required>
            </div>

            <div class="email">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder=" Digite o seu email" required>
            </div>

            <div class="celular">
                <label for="celular">Celular</label>
                <input type="tel" id="celular" name="celular" placeholder="(xx) xxxxx-xxxx" required>
            </div>

            <div class="pass" >
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder=" Digite a sua senha" required>

                <label for="confirmacao">Confirme a sua senha</label>
                <input type="password" id="confirmacao" name="confirmacao" placeholder="Digite a mesma senha" required>
            </div>

            <input type="submit" value="Confirmar">
        </form>
    </main>
    <footer>
        <div class="loc">
            <span class="material-symbols-outlined">location_on</span>
            <p>Rua Antonio Canineo 32 - parque são luis</p>
        </div>

        <div class="insta">
            <img src="../imagens/Instagram.svg" alt="">
            <p>@dautinn</p>
        </div>

        <div class="cel">
            <span class="material-symbols-outlined">
            call</span>
            <p>(12) 99653-0060</p>
        </div>

        <div class="mail">
            <span class="material-symbols-outlined">
            mail</span>
            <p>adauto.netto2005@gmail.com</p>
        </div>
    </footer>
</body>
</html>
